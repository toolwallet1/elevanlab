<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 300px; padding: 16px; }
    h3 { margin: 0 0 12px; color: #333; }
    input { width: 100%; padding: 8px; margin: 6px 0 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 12px; font-size: 13px; color: #555; word-break: break-all; }
    .saved { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h3>⚡ ElevenLabs Auto Signup</h3>

  <label>AWS Server URL:</label>
  <input type="text" id="serverUrl" placeholder="http://YOUR-AWS-IP:3000" />

  <button id="saveBtn">Save & Start</button>

  <div id="status">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
