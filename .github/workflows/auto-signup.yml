name: Auto Signup

on:
  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Run reason (optional)'
        required: false
        default: 'manual'

  # schedule:
  #   - cron: '0 */6 * * *'

jobs:
  run-signup:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run auto-signup script
        env:
          API_URL: ${{ secrets.API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          SITE2_URL: ${{ secrets.SITE2_URL }}
        run: node auto-signup.js
